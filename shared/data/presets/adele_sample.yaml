# 아델 캐릭터 스펙 예시
character:
  class: "Adele"
  level: 275
  weapon_constant: 1.3 # 튜너
  
  # 주스탯/부스탯 설정
  main_stat_type: "STR"
  sub_stat_types: ["DEX"]

  # 기본 스탯 (마을 스탯창 기준, 자버프 제외)
  stats:
    str: 45000
    dex: 5000
    int: 1000
    luk: 1000
    hp: 50000
    mp: 30000
    
    # 스탯 % (이미 적용된 값이면 0으로 설정하거나, 추가 계산이 필요한 경우 입력)
    str_percent: 0 
    
    attack_power: 3000
    magic_power: 0
    
    damage: 120 # 데미지 %
    boss_damage: 350 # 보스 데미지 %
    final_damage: 10 # 최종 데미지 % (직업 기본 패시브 등)
    
    critical_chance: 100
    critical_damage: 85
    
    ignore_defense: [95, 20] # 방어율 무시 소스들 (95%, 20%)
    
    mastery: 95 # 숙련도 %
